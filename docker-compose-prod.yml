# =============================================================================
# PwNotify — Production Compose (Compose Spec, kein `version:`-Feld)
#
# Zieht das fertige Image von Docker Hub (amslertec/pwnotify) — KEIN Build nötig.
#   1) cp example.env .env   &&  Werte anpassen (mind. Passwörter setzen!)
#   2) docker compose -f docker-compose-prod.yml pull
#   3) docker compose -f docker-compose-prod.yml up -d
#
# Härtung: non-root, read-only rootfs, no-new-privileges, cap_drop ALL,
# internes Netz für die DB, Healthchecks, Resource-Limits.
# =============================================================================
name: pwnotify

services:
  db:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pwnotify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-pwnotify}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pwnotify} -d ${POSTGRES_DB:-pwnotify}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - internal

  app:
    # Von Docker Hub. Für unveränderliche Deployments per Digest pinnen, z. B.:
    #   PWNOTIFY_IMAGE=amslertec/pwnotify:0.1.10@sha256:<digest>
    image: ${PWNOTIFY_IMAGE:-amslertec/pwnotify:0.1.10}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PWNOTIFY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pwnotify}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-pwnotify}
      PWNOTIFY_SECRET_KEY: ${PWNOTIFY_SECRET_KEY:-}
      PWNOTIFY_BASE_URL: ${PWNOTIFY_BASE_URL:-http://localhost:8080}
      PWNOTIFY_COOKIE_SECURE: ${PWNOTIFY_COOKIE_SECURE:-true}
      PWNOTIFY_LOG_LEVEL: ${PWNOTIFY_LOG_LEVEL:-INFO}
      PWNOTIFY_LOG_JSON: ${PWNOTIFY_LOG_JSON:-true}
      PWNOTIFY_TIMEZONE: ${PWNOTIFY_TIMEZONE:-Europe/Zurich}
      # Optionaler Erst-Admin-Seed (nur beim allerersten Start ausgewertet):
      PWNOTIFY_ADMIN_USERNAME: ${PWNOTIFY_ADMIN_USERNAME:-}
      PWNOTIFY_ADMIN_PASSWORD: ${PWNOTIFY_ADMIN_PASSWORD:-}
      # Graph/Mail können auch komplett über die Setup-UI konfiguriert werden:
      PWNOTIFY_GRAPH_TENANT_ID: ${PWNOTIFY_GRAPH_TENANT_ID:-}
      PWNOTIFY_GRAPH_CLIENT_ID: ${PWNOTIFY_GRAPH_CLIENT_ID:-}
      PWNOTIFY_GRAPH_CLIENT_SECRET: ${PWNOTIFY_GRAPH_CLIENT_SECRET:-}
      PWNOTIFY_MAIL_BACKEND: ${PWNOTIFY_MAIL_BACKEND:-graph}
      PWNOTIFY_MAIL_FROM: ${PWNOTIFY_MAIL_FROM:-}
    # Host-Port-Bindung. Hinter einem TLS-Reverse-Proxy: 127.0.0.1:8080 (nur lokal).
    # Direkt im LAN erreichbar: PWNOTIFY_BIND=0.0.0.0:8080 in .env setzen.
    ports:
      - "${PWNOTIFY_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - internal

    # ----------------------------------------------------------------------
    # Beispiel Reverse-Proxy (Traefik) — bei Bedarf einkommentieren und
    # PWNOTIFY_BIND=127.0.0.1:8080 sowie PWNOTIFY_COOKIE_SECURE=true setzen:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.pwnotify.rule=Host(`pwnotify.example.com`)"
    #   - "traefik.http.routers.pwnotify.entrypoints=websecure"
    #   - "traefik.http.routers.pwnotify.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.pwnotify.loadbalancer.server.port=8080"
    # ----------------------------------------------------------------------

volumes:
  pgdata:
  data:

networks:
  internal:
    driver: bridge
