# =============================================================================
# PwNotify — production compose (Compose Spec, no `version:` field)
#
# Pulls the prebuilt image from Docker Hub (amslertec/pwnotify) — no build needed.
#   1) cp example.env .env   &&  adjust the values (set the passwords at least!)
#   2) docker compose -f docker-compose-prod.yml pull
#   3) docker compose -f docker-compose-prod.yml up -d
#
# Hardening: non-root, read-only rootfs, no-new-privileges, cap_drop ALL,
# internal network for the database, healthchecks, resource limits.
# =============================================================================
name: pwnotify

services:
  db:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pwnotify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pwnotify}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pwnotify} -d ${POSTGRES_DB:-pwnotify}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - internal

  app:
    # From Docker Hub. Pin by digest for immutable deployments, e.g.:
    #   PWNOTIFY_IMAGE=amslertec/pwnotify:0.2.4@sha256:<digest>
    image: ${PWNOTIFY_IMAGE:-amslertec/pwnotify:0.2.4}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PWNOTIFY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pwnotify}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-pwnotify}
      PWNOTIFY_SECRET_KEY: ${PWNOTIFY_SECRET_KEY:-}
      PWNOTIFY_BASE_URL: ${PWNOTIFY_BASE_URL:-http://localhost:8080}
      PWNOTIFY_COOKIE_SECURE: ${PWNOTIFY_COOKIE_SECURE:-true}
      # Who may claim a client's IP via X-Forwarded-For? Enter the address the app
      # actually SEES — behind a proxy on another host that is the proxy's LAN IP;
      # with a proxy on this host, Docker rewrites the source and the app sees the
      # bridge gateway (172.16.0.0/12). Get it wrong and every user shares one rate
      # limit, so a single attacker can lock everyone out. Never "*". See example.env.
      PWNOTIFY_TRUSTED_PROXIES: ${PWNOTIFY_TRUSTED_PROXIES:-127.0.0.1}
      # Sign out after this many minutes without activity (0 = off). The session
      # record is deleted, not just revoked.
      PWNOTIFY_IDLE_TIMEOUT_MIN: ${PWNOTIFY_IDLE_TIMEOUT_MIN:-30}
      # Accepted Host header values, comma-separated. Empty = no check.
      PWNOTIFY_ALLOWED_HOSTS: ${PWNOTIFY_ALLOWED_HOSTS:-}
      PWNOTIFY_LOG_LEVEL: ${PWNOTIFY_LOG_LEVEL:-INFO}
      PWNOTIFY_LOG_JSON: ${PWNOTIFY_LOG_JSON:-true}
      PWNOTIFY_TIMEZONE: ${PWNOTIFY_TIMEZONE:-Europe/Zurich}
      # Optional first-admin seed (only evaluated on the very first start):
      PWNOTIFY_ADMIN_USERNAME: ${PWNOTIFY_ADMIN_USERNAME:-}
      PWNOTIFY_ADMIN_PASSWORD: ${PWNOTIFY_ADMIN_PASSWORD:-}
      # Graph and mail can also be configured entirely through the setup wizard:
      PWNOTIFY_GRAPH_TENANT_ID: ${PWNOTIFY_GRAPH_TENANT_ID:-}
      PWNOTIFY_GRAPH_CLIENT_ID: ${PWNOTIFY_GRAPH_CLIENT_ID:-}
      PWNOTIFY_GRAPH_CLIENT_SECRET: ${PWNOTIFY_GRAPH_CLIENT_SECRET:-}
      PWNOTIFY_MAIL_BACKEND: ${PWNOTIFY_MAIL_BACKEND:-graph}
      PWNOTIFY_MAIL_FROM: ${PWNOTIFY_MAIL_FROM:-}
    # Host port binding. Proxy on THIS host: 127.0.0.1:8080 (local only).
    # Proxy on another host, or direct LAN access: PWNOTIFY_BIND=0.0.0.0:8080 in .env.
    ports:
      - "${PWNOTIFY_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - internal

    # ----------------------------------------------------------------------
    # Reverse-proxy example (Traefik) — uncomment if needed and set
    # PWNOTIFY_BIND=127.0.0.1:8080 plus PWNOTIFY_COOKIE_SECURE=true:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.pwnotify.rule=Host(`pwnotify.example.com`)"
    #   - "traefik.http.routers.pwnotify.entrypoints=websecure"
    #   - "traefik.http.routers.pwnotify.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.pwnotify.loadbalancer.server.port=8080"
    # ----------------------------------------------------------------------

volumes:
  pgdata:
  data:

networks:
  internal:
    driver: bridge
