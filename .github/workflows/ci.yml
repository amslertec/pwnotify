name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ vars.DOCKERHUB_USERNAME || 'amslertec' }}/pwnotify

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- Backend
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: pwnotify
          POSTGRES_PASSWORD: pwnotify
          POSTGRES_DB: pwnotify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwnotify -d pwnotify_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: '0.11.28'
      - run: uv sync --frozen
      - name: Ruff (lint + format)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: mypy (strict)
        run: uv run mypy app
      - name: pytest
        env:
          PWNOTIFY_TEST_DATABASE_URL: postgresql+asyncpg://pwnotify:pwnotify@localhost:5432/pwnotify_test
        run: uv run pytest -q

  # --------------------------------------------------------------- Frontend
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '11.12.0'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  # ----------------------------------------------------------------- Docker
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 'yes' nur wenn das Docker-Hub-Token als Repo-Secret hinterlegt ist. Ohne
    # Secrets werden Push/Scout-Schritte übersprungen (statt rot fehlzuschlagen).
    env:
      HAS_PUSH_CREDS: ${{ secrets.DOCKERHUB_TOKEN != '' && 'yes' || 'no' }}
    # Build-once staging area. We build the multi-arch image exactly ONCE, push it
    # into this ephemeral local registry, scan THOSE bytes, and (only on push with
    # creds) promote the very same digest to Docker Hub. This guarantees "scan == ship":
    # the bytes gated by Trivy are byte-for-byte the bytes we publish, instead of
    # scanning one build and shipping a second, separately-built one.
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      # network=host lets the buildkit container reach the `registry` service on
      # localhost:5000. buildkit treats localhost/loopback registries as insecure
      # (plain HTTP) automatically, so no extra buildkitd config is required.
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: network=host

      # Tags + labels are computed up front so the single build below carries the
      # same OCI labels as the shipped image, and the promote step can reuse the
      # exact tag set. Runs unconditionally (harmless on PRs; the tag list is simply
      # empty there and only consumed on push).
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      # Build the multi-arch image ONCE (amd64+arm64, SBOM + provenance) and push it
      # to the local registry. arm64 builds under QEMU (via setup-qemu-action above)
      # since this runner is amd64-only. steps.build.outputs.digest is the OCI index
      # digest that we scan below and promote unchanged — no second build.
      - name: Build multi-arch once (SBOM + provenance) -> local registry
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: true
          tags: localhost:5000/pwnotify:ci
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ github.event.repository.updated_at }}

      # Resolve the per-arch manifest digests out of the freshly built index so Trivy
      # scans the EXACT bytes that were built (a digest ref, not a re-pull of a tag).
      # The two attestation manifests (platform unknown/unknown) are filtered out.
      - name: Resolve per-arch digests
        id: arch
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          raw="$(docker buildx imagetools inspect --raw "localhost:5000/pwnotify@$BUILD_DIGEST")"
          amd64="$(echo "$raw" | jq -r '.manifests[] | select(.platform.os=="linux" and .platform.architecture=="amd64") | .digest')"
          arm64="$(echo "$raw" | jq -r '.manifests[] | select(.platform.os=="linux" and .platform.architecture=="arm64") | .digest')"
          test -n "$amd64" && test -n "$arm64"
          echo "amd64=$amd64" >> "$GITHUB_OUTPUT"
          echo "arm64=$arm64" >> "$GITHUB_OUTPUT"

      # Both arches are gated BEFORE anything is promoted. Scanning the per-arch digest
      # inspects each architecture's layers regardless of the runner arch (Trivy never
      # runs the container). go-containerregistry auto-detects localhost as HTTP, so no
      # insecure flag is needed. Either finding fails the job, exactly as before.
      - name: Trivy scan amd64 (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: localhost:5000/pwnotify@${{ steps.arch.outputs.amd64 }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          scanners: vuln

      - name: Trivy scan arm64 (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: localhost:5000/pwnotify@${{ steps.arch.outputs.arm64 }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          scanners: vuln

      - name: Docker Scout (policy gate)
        if: github.event_name == 'pull_request' && env.HAS_PUSH_CREDS == 'yes'
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1
        with:
          command: cves
          # Point Scout at the amd64 single-platform DIGEST in the local registry, not the
          # multi-arch `:ci` tag. Like Trivy above, Scout resolves registry refs via
          # go-containerregistry, which auto-uses HTTP for a loopback registry -- but a
          # single-platform digest avoids having to pick a platform out of a multi-arch index
          # over that HTTP endpoint, which the tag form does not resolve reliably. PR-only and
          # advisory; the authoritative gate is the two Trivy scans on the exact built digests.
          image: localhost:5000/pwnotify@${{ steps.arch.outputs.amd64 }}
          only-severities: critical,high
          exit-code: true
        env:
          DOCKER_SCOUT_HUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---- Promote nur auf main / Tag ----
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.HAS_PUSH_CREDS == 'yes'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Promote WITHOUT rebuilding: imagetools create copies the complete OCI index
      # (both arch manifests + the SBOM/provenance attestation manifests) by digest
      # to the Docker Hub tags. The published index digest and every per-arch digest
      # are byte-identical to the scanned ones — the gated bytes are the shipped bytes.
      - name: Promote scanned image to Docker Hub (no rebuild)
        if: github.event_name == 'push' && env.HAS_PUSH_CREDS == 'yes'
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r t; do
            [ -n "$t" ] && tag_args+=( --tag "$t" )
          done <<< "$META_TAGS"
          docker buildx imagetools create "${tag_args[@]}" \
            "localhost:5000/pwnotify@$BUILD_DIGEST"

      # Sync the Docker Hub repository "Overview" from DOCKERHUB.md so the published
      # description never drifts from the shipped version again. Tag-releases only (not
      # every main push) and only when push creds exist. Uses the same DOCKERHUB_TOKEN as
      # the image push -- it must have read/write repo scope for the description API.
      - name: Sync Docker Hub description
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_PUSH_CREDS == 'yes'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          readme-filepath: ./DOCKERHUB.md
          short-description: "Password expiry notification for Microsoft Entra ID - hardened, self-hosted, multi-tenant"
