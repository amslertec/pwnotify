name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ vars.DOCKERHUB_USERNAME || 'amslertec' }}/pwnotify

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- Backend
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: pwnotify
          POSTGRES_PASSWORD: pwnotify
          POSTGRES_DB: pwnotify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwnotify -d pwnotify_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: '0.11.28'
      - run: uv sync --frozen
      - name: Ruff (lint + format)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: mypy (strict)
        run: uv run mypy app
      - name: pytest
        env:
          PWNOTIFY_TEST_DATABASE_URL: postgresql+asyncpg://pwnotify:pwnotify@localhost:5432/pwnotify_test
        run: uv run pytest -q

  # --------------------------------------------------------------- Frontend
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '11.12.0'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  # ----------------------------------------------------------------- Docker
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 'yes' nur wenn das Docker-Hub-Token als Repo-Secret hinterlegt ist. Ohne
    # Secrets werden Push/Scout-Schritte übersprungen (statt rot fehlzuschlagen).
    env:
      HAS_PUSH_CREDS: ${{ secrets.DOCKERHUB_TOKEN != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The image below is later pushed as linux/amd64,linux/arm64 (see "Build & push
      # multi-arch"). To make sure neither architecture ships unscanned, both are built
      # locally and gated with Trivy BEFORE anything is pushed. arm64 runs under QEMU
      # (via setup-qemu-action above) since this runner is amd64-only; `load: true` works
      # for a single foreign platform because Trivy only inspects image layers, it never
      # executes the container. This keeps the existing pre-push gate intact instead of
      # moving the scan after the push (which would risk shipping an unscanned/vulnerable
      # image before the gate could fail the job).
      - name: Build (local, amd64) for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:scan
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}

      - name: Trivy scan amd64 (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          scanners: vuln

      - name: Build (local, arm64) for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: ${{ env.IMAGE }}:scan-arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}

      - name: Trivy scan arm64 (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan-arm64
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          scanners: vuln

      - name: Docker Scout (policy gate)
        if: github.event_name == 'pull_request' && env.HAS_PUSH_CREDS == 'yes'
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1
        with:
          command: cves
          image: ${{ env.IMAGE }}:scan
          only-severities: critical,high
          exit-code: true
        env:
          DOCKER_SCOUT_HUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---- Push nur auf main / Tag ----
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.HAS_PUSH_CREDS == 'yes'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        if: github.event_name == 'push' && env.HAS_PUSH_CREDS == 'yes'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build & push multi-arch (SBOM + provenance)
        if: github.event_name == 'push' && env.HAS_PUSH_CREDS == 'yes'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ github.event.repository.updated_at }}
